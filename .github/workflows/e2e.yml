name: E2E Tests

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start Docker services
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for Docker services to be ready..."
          for i in {1..60}; do
            if docker compose ps | grep -q "healthy\|Up" && \
               docker compose exec -T web curl -f http://localhost:3000 > /dev/null 2>&1 && \
               docker compose exec -T api-gateway curl -f http://localhost:3001/health > /dev/null 2>&1; then
              echo "Services are ready!"
              exit 0
            fi
            echo "Attempt $i/60 - waiting for services..."
            sleep 2
          done
          echo "ERROR: Services failed to start within timeout"
          docker compose logs
          exit 1

      - name: Build web application
        run: pnpm nx run web:build --skip-nx-cache

      - name: Run E2E tests
        run: pnpm nx run e2e-ui:e2e

      - name: Upload Playwright report on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
