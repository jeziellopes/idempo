name: CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Determine base and head SHAs for affected check
        id: affected
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
            echo "head=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            echo "base=${{ github.event.before }}" >> $GITHUB_OUTPUT
            echo "head=${{ github.event.after }}" >> $GITHUB_OUTPUT
          fi

      - name: Lint affected projects
        run: pnpm nx affected --base=${{ steps.affected.outputs.base }} --head=${{ steps.affected.outputs.head }} --target=lint

      - name: Typecheck affected projects
        run: pnpm nx affected --base=${{ steps.affected.outputs.base }} --head=${{ steps.affected.outputs.head }} --target=typecheck

      - name: Build affected projects
        run: pnpm nx affected --base=${{ steps.affected.outputs.base }} --head=${{ steps.affected.outputs.head }} --target=build

  e2e-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run backend E2E tests
        run: pnpm nx run e2e:e2e

      - name: Upload backend E2E report on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-report
          path: coverage/
          retention-days: 7

  e2e-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build all projects (required for Docker images)
        run: pnpm build

      - name: Start Docker services with rebuilt images
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for Docker services to be ready..."
          for i in {1..60}; do
            if docker compose ps | grep -q "healthy\|Up" && \
               docker compose exec -T web curl -f http://localhost:3000 > /dev/null 2>&1 && \
               docker compose exec -T api-gateway curl -f http://localhost:3001/health > /dev/null 2>&1; then
              echo "Services are ready!"
              exit 0
            fi
            echo "Attempt $i/60 - waiting for services..."
            sleep 2
          done
          echo "ERROR: Services failed to start within timeout"
          docker compose logs
          exit 1

      - name: Run UI E2E tests
        run: pnpm nx run e2e-ui:e2e

      - name: Upload Playwright report on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-e2e-results
          path: test-results/
          retention-days: 7

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
