name: idempo

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  idempo:
    driver: bridge

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  kafka_data:
  game_db_data:
  leaderboard_db_data:
  wallet_db_data:
  marketplace_db_data:
  inventory_db_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:

# ─── Services ────────────────────────────────────────────────────────────────
services:

  # ── Apache Kafka (KRaft mode — no ZooKeeper) ───────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: idempo-kafka
    ports:
      - "9092:9092"    # external (host) access
      - "9093:9093"    # controller
    environment:
      # KRaft settings
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Cluster identity — required for KRaft; fixed value for determinism
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg==
      # Topics
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      # Storage
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Log retention
      KAFKA_LOG_RETENTION_HOURS: "168"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - idempo
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Kafka topic initialiser (runs once, then exits) ────────────────────────
  kafka-init:
    image: apache/kafka:3.9.0
    container_name: idempo-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        for topic in player-actions match-events economy-events leaderboard-events player-actions.dlq match-events.dlq economy-events.dlq; do
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic $$topic --partitions 3 --replication-factor 1
          echo "Topic ready: $$topic"
        done
    networks:
      - idempo
    restart: "no"

  # ── PostgreSQL — game_db ───────────────────────────────────────────────────
  game-db:
    image: postgres:17-alpine
    container_name: idempo-game-db
    ports:
      - "5440:5432"
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: idempo
      POSTGRES_PASSWORD: idempo
    volumes:
      - game_db_data:/var/lib/postgresql/data
      - ./infra/db/game_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - idempo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idempo -d game_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL — wallet_db ─────────────────────────────────────────────────
  wallet-db:
    image: postgres:17-alpine
    container_name: idempo-wallet-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: wallet_db
      POSTGRES_USER: idempo
      POSTGRES_PASSWORD: idempo
    volumes:
      - wallet_db_data:/var/lib/postgresql/data
      - ./infra/db/wallet_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - idempo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idempo -d wallet_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL — marketplace_db ────────────────────────────────────────────
  marketplace-db:
    image: postgres:17-alpine
    container_name: idempo-marketplace-db
    ports:
      - "5441:5432"
    environment:
      POSTGRES_DB: marketplace_db
      POSTGRES_USER: idempo
      POSTGRES_PASSWORD: idempo
    volumes:
      - marketplace_db_data:/var/lib/postgresql/data
      - ./infra/db/marketplace_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - idempo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idempo -d marketplace_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL — inventory_db ──────────────────────────────────────────────
  inventory-db:
    image: postgres:17-alpine
    container_name: idempo-inventory-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: idempo
      POSTGRES_PASSWORD: idempo
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
      - ./infra/db/inventory_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - idempo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idempo -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL — leaderboard_db ──────────────────────────────────────────
  leaderboard-db:
    image: postgres:17-alpine
    container_name: idempo-leaderboard-db
    ports:
      - "5442:5432"
    environment:
      POSTGRES_DB: leaderboard_db
      POSTGRES_USER: idempo
      POSTGRES_PASSWORD: idempo
    volumes:
      - leaderboard_db_data:/var/lib/postgresql/data
      - ./infra/db/leaderboard_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - idempo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idempo -d leaderboard_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7.4 LTS ─────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: idempo-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    networks:
      - idempo
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Jaeger (distributed tracing) ──────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: idempo-jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # HTTP collector (legacy)
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP (services send traces here)
      - "6831:6831/udp"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - idempo

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: idempo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - idempo

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.4.0
    container_name: idempo-grafana
    ports:
      - "3100:3000"  # 3100 on host to avoid clash with Next.js dev server
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: idempo
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - idempo

  # ── Loki (log aggregation) ─────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.3.0
    container_name: idempo-loki
    ports:
      - "3200:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - idempo

  # ============================================================
  # App services (built from Dockerfile)
  # Requires: cp .env.example .env && docker compose up -d --build
  # ============================================================

  # ── API Gateway (port 3001) ────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      target: nestjs
      args:
        APP_NAME: api-gateway
    container_name: idempo-api-gateway
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET:-idempo-local-dev-secret-change-in-prod}
      GAME_SERVICE_URL: http://game-service:3002
      LEADERBOARD_SERVICE_URL: http://leaderboard-service:3005
      WALLET_SERVICE_URL: http://wallet-service:3004
      INVENTORY_SERVICE_URL: http://inventory-service:3006
      MARKETPLACE_SERVICE_URL: http://marketplace-service:3008
      NOTIFICATION_SERVICE_URL: http://notification-service:3009
      CORS_ORIGIN: http://localhost:3000
      OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - idempo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Game Service (port 3002) ───────────────────────────────────────────
  game-service:
    build:
      context: .
      target: nestjs
      args:
        APP_NAME: game-service
    container_name: idempo-game-service
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      DB_HOST: game-db
      DB_PORT: "5432"
      DB_NAME: game_db
      DB_USER: idempo
      DB_PASS: idempo
      KAFKA_BROKERS: kafka:9092
      OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      kafka:
        condition: service_healthy
      game-db:
        condition: service_healthy
    networks:
      - idempo

  # ── Combat Service (port 3003) ─────────────────────────────────────────
  combat-service:
    build:
      context: .
      target: nestjs
      args:
        APP_NAME: combat-service
    container_name: idempo-combat-service
    environment:
      PORT: "3003"
      KAFKA_BROKERS: kafka:9092
      OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - idempo

  # ── Leaderboard Service (port 3005) ────────────────────────────────────
  leaderboard-service:
    build:
      context: .
      target: nestjs
      args:
        APP_NAME: leaderboard-service
    container_name: idempo-leaderboard-service
    ports:
      - "3005:3005"
    environment:
      PORT: "3005"
      DB_HOST: leaderboard-db
      DB_PORT: "5432"
      DB_NAME: leaderboard_db
      DB_USER: idempo
      DB_PASS: idempo
      KAFKA_BROKERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    depends_on:
      kafka:
        condition: service_healthy
      leaderboard-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - idempo

  # ── Web (Next.js, port 3000) ────────────────────────────────────────────────
  web:
    build:
      context: .
      target: nextjs
    container_name: idempo-web
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - idempo
